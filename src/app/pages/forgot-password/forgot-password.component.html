<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card login-card shadow-lg">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="login-title">Recuperar Senha</h2>
        <p class="text-muted">Informe seus dados para trocar a senha</p>
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="phone" class="form-label">Telefone com DDD</label>
          <input type="text" id="phone" name="phone" class="form-control custom-input"
            placeholder="(00) 00000-0000" [(ngModel)]="phone" required />
        </div>

        <div class="mb-3">
          <label for="cpf" class="form-label">CPF</label>
          <input type="text" id="cpf" name="cpf" class="form-control custom-input"
            placeholder="123.456.789-01" [(ngModel)]="cpf" required />
        </div>

        <div class="mb-3">
          <label for="birthDate" class="form-label">Data de Nascimento</label>
          <input type="date" id="birthDate" name="birthDate" class="form-control custom-input"
            [(ngModel)]="birthDate" required />
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">Nova Senha</label>
          <input type="password" id="newPassword" name="newPassword" class="form-control custom-input"
            placeholder="Sua nova senha" [(ngModel)]="newPassword" required />
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Repita a Senha</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-control custom-input"
            placeholder="Confirme sua nova senha" [(ngModel)]="confirmPassword" required />
        </div>

        <div class="d-grid gap-2 mb-3">
          <button type="submit" class="btn btn-primary btn-login">Trocar Senha</button>
        </div>

        <div class="text-center">
          <button type="button" class="btn btn-link text-decoration-none p-0" routerLink="/login">
            Voltar para o Login
          </button>
        </div>

        <div *ngIf="errorMsg" class="alert alert-danger mt-3 py-2 small text-center" role="alert">
          {{ errorMsg }}
        </div>

        <div *ngIf="successMsg" class="alert alert-success mt-3 py-2 small text-center" role="alert">
          {{ successMsg }}
        </div>
      </form>
    </div>
  </div>
</div>
