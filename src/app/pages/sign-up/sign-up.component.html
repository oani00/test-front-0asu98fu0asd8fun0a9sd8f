<h2>Sign Up</h2>
<form (ngSubmit)="onSubmit()" autocomplete="off">
  <label for="name">Nome:</label>
  <input type="text" id="name" [(ngModel)]="name" name="name" required><br><br>

  <label for="surname">Sobrenome:</label>
  <input type="text" id="surname" [(ngModel)]="surname" name="surname" required><br><br>

  <label for="phone">Telefone:</label>
  <input type="text" id="phone" [(ngModel)]="phone" name="phone" placeholder="(00) 00000-0000" required><br><br>

  <label for="birthDate">Data de nascimento:</label>
  <input type="date" id="birthDate" [(ngModel)]="birthDate" name="birthDate" required><br><br>

  <label for="cpf">CPF:</label>
  <input type="text" id="cpf" [(ngModel)]="cpf" name="cpf" placeholder="123.456.789-01" required><br><br>



  <label for="email">Email:</label>
  <input type="email" id="email" [(ngModel)]="email" name="email" required><br><br>

  <label for="password">Senha:</label>
  <input type="password" id="password" [(ngModel)]="password" name="password" required><br><br>

  <button type="submit">Criar Conta</button>
</form>

<div *ngIf="message" style="color: green; margin-top: 10px;">{{ message }}</div>
<div *ngIf="error" style="color: red; margin-top: 10px;">{{ error }}</div>
