<div class="signup-container d-flex align-items-center justify-content-center">
  <div class="card signup-card shadow-lg">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="signup-title">Criar Conta</h2>
        <p class="text-muted">Preencha os dados abaixo para se cadastrar</p>
      </div>

      <form (ngSubmit)="onSubmit()" autocomplete="off">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="name" class="form-label">Nome</label>
            <input
              type="text"
              id="name"
              name="name"
              class="form-control custom-input"
              placeholder="Seu nome"
              [(ngModel)]="name"
              required
            />
          </div>
          <div class="col-md-6 mb-3">
            <label for="surname" class="form-label">Sobrenome</label>
            <input
              type="text"
              id="surname"
              name="surname"
              class="form-control custom-input"
              placeholder="Seu sobrenome"
              [(ngModel)]="surname"
              required
            />
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="phone" class="form-label">Telefone</label>
            <input
              type="text"
              id="phone"
              name="phone"
              class="form-control custom-input"
              placeholder="(00) 00000-0000"
              [(ngModel)]="phone"
              required
              maxlength="11"
            />
          </div>
          <div class="col-md-6 mb-3">
            <label for="birthDate" class="form-label">Data de Nascimento</label>
            <input
              type="date"
              id="birthDate"
              name="birthDate"
              class="form-control custom-input"
              [(ngModel)]="birthDate"
              required
            />
          </div>
        </div>

        <div class="mb-3">
          <label for="cpf" class="form-label">CPF</label>
          <input
            type="text"
            id="cpf"
            name="cpf"
            class="form-control custom-input"
            placeholder="000.000.000-00"
            maxlength="11"
            [(ngModel)]="cpf"
            required
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control custom-input"
            placeholder="Sua senha"
            [(ngModel)]="password"
            required
          />
        </div>

        <div class="d-grid gap-2 mb-3">
          <button type="submit" class="btn btn-primary btn-signup">Criar Conta</button>
        </div>

        <hr />

        <div class="text-center">
          <span class="text-muted">Já tem uma conta? </span>
          <button type="button" class="btn btn-outline-secondary btn-sm ms-2" routerLink="/login">
            Entrar
          </button>
        </div>

        <div *ngIf="message" class="alert alert-success mt-3 py-2 small text-center" role="alert">
          {{ message }}
        </div>
        <div *ngIf="error" class="alert alert-danger mt-3 py-2 small text-center" role="alert">
          {{ error }}
        </div>
      </form>
    </div>
  </div>
</div>
