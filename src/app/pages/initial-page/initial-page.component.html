<div class="center-container">
  <div *ngIf="loading">Carregando...</div>
  
  <!-- Top Carousel -->
  <div class="carousel-container" *ngIf="!loading && topExcursions.length > 0">
    <div class="carousel-track" [ngStyle]="{'transform': 'translateX(' + topTranslate + '%)'}">
      <div 
        *ngFor="let excursion of duplicatedTopExcursions" 
        class="excursion-card"
        [routerLink]="['/excursion-detail', excursion._id]">
        <img
          [src]="getPictureUrl(excursion)"
          [alt]="excursion.name"
          class="excursion-image"
        />
        <div class="excursion-info">
          <h3>{{ excursion.name }}</h3>
          <p *ngIf="excursion.price">R$ {{ excursion.price | number:'1.2-2' }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Center: Bem Vindo Button -->
  <br />
  <div>
    <button class="vertical-button" routerLink="/menu-general">
      BEM VINDO
    </button>
  </div>
  <br />

  <!-- Bottom Carousel -->
  <div class="carousel-container" *ngIf="!loading && bottomExcursions.length > 0">
    <div class="carousel-track reverse" [ngStyle]="{'transform': 'translateX(' + bottomTranslate + '%)'}">
      <div 
        *ngFor="let excursion of duplicatedBottomExcursions" 
        class="excursion-card"
        [routerLink]="['/excursion-detail', excursion._id]">
        <img
          [src]="getPictureUrl(excursion)"
          [alt]="excursion.name"
          class="excursion-image"
        />
        <div class="excursion-info">
          <h3>{{ excursion.name }}</h3>
          <p *ngIf="excursion.price">R$ {{ excursion.price | number:'1.2-2' }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Fallback if no excursions -->
  <div *ngIf="!loading && topExcursions.length === 0 && bottomExcursions.length === 0">
    <p>Nenhuma excursão disponível no momento.</p>
  </div>
</div>
