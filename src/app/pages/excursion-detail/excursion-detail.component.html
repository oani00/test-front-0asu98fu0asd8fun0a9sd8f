<div class="excursion-detail-container">
  <div class="content-card">
    <div class="image-wrapper">
      <img
        *ngIf="viagem"
        [src]="getPictureUrl()"
        [alt]="viagem.name"
        class="excursion-hero-image"
      />
      <div class="hero-overlay">
        <h1 class="excursion-title">{{ viagem?.name }}</h1>
        <span class="excursion-date"
          ><i class="icon-calendar"></i> Ida:
          {{ viagem?.date | date: "dd/MM/yyyy" : "UTC" }}</span
        >
        <span *ngIf="viagem?.returnDate" class="excursion-date"
          ><i class="icon-calendar"></i> Volta:
          {{ viagem?.returnDate | date: "dd/MM/yyyy" : "UTC" }}</span
        >
      </div>
    </div>

    <div class="details-grid">
      <div class="info-section">
        <div class="included-section">
          <h3 class="section-title">Descrição</h3>
          <p>{{ viagem?.description }}</p>
        </div>
      </div>

      <div class="action-section">
        <div class="price-card">
          <p class="price-label">A partir de</p>
          <h2 class="price-value">R$ {{ viagem?.price | number: "1.2-2" }}</h2>
          <p class="price-sub">Por pessoa</p>
        </div>

        <div class="subscription-section">
          <button
            *ngIf="!isSubscribed"
            type="button"
            class="action-button subscribe-btn"
            (click)="subscribeNow()"
            [disabled]="!currentUser"
          >
            Inscrever-se Agora
          </button>
          <button
            *ngIf="isSubscribed"
            type="button"
            class="action-button enrolled-state-btn"
            disabled
            aria-label="Você já está inscrito nesta excursão"
          >
            Inscrito
          </button>
          <p *ngIf="!currentUser" class="login-required">
            <i class="icon-warning"></i> Faça login para se inscrever
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
